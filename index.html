<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APK Builder Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #080c14;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      color: #e2e8f0;
      direction: rtl;
    }
    input, button, pre, select, textarea { font-family: inherit; }
    button { cursor: pointer; }

    /* Header */
    .header {
      border-bottom: 1px solid #1e293b;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(90deg, #080c14 0%, #0f172a 100%);
      flex-wrap: wrap;
    }
    .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 0 20px #0ea5e960;
      flex-shrink: 0;
    }
    .logo-text { font-size: 18px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
    .logo-sub { font-size: 11px; color: #475569; margin-top: 1px; }
    .steps-nav { margin-right: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .step-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 11px; font-family: inherit; border: none; background: transparent;
      transition: all 0.2s;
    }
    .step-dot {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #fff; flex-shrink: 0;
    }

    /* Main */
    .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    .section-title { font-size: 26px; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; text-align: center; }
    .section-sub { color: #64748b; font-size: 13px; text-align: center; margin-bottom: 32px; }
    .accent { color: #0ea5e9; }
    .accent-green { color: #22c55e; }
    .accent-purple { color: #a78bfa; }

    /* Form */
    .form-wrapper { max-width: 560px; margin: 0 auto; display: grid; gap: 20px; }
    .field-label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; display: block; font-weight: 500; }
    .field-input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      background: #0f172a; border: 1px solid #1e293b;
      color: #e2e8f0; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #0ea5e9; }
    .field-hint { font-size: 11px; color: #475569; margin-top: 5px; }

    /* Info card */
    .info-card {
      margin-top: 32px; padding: 16px; border-radius: 10px;
      background: #0f172a; border: 1px solid #1e293b;
      max-width: 560px; margin: 32px auto 0;
    }
    .info-title { font-size: 11px; color: #0ea5e9; margin-bottom: 8px; font-weight: 600; }
    .info-text { font-size: 11px; color: #64748b; line-height: 1.8; }

    /* Permissions grid */
    .perms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .perm-card {
      padding: 12px 16px; border-radius: 10px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .perm-icon { font-size: 20px; flex-shrink: 0; }
    .perm-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .perm-desc { font-size: 10px; color: #475569; }
    .perm-badge { font-size: 9px; color: #22c55e; margin-right: 6px; font-weight: 400; }
    .perm-check {
      width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #fff; margin-right: auto;
    }

    /* Summary bar */
    .summary-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .summary-tag {
      padding: 6px 14px; border-radius: 20px; background: #0f172a;
      border: 1px solid #1e293b; font-size: 11px; color: #94a3b8;
      display: flex; gap: 6px; align-items: center;
    }

    /* File tabs */
    .file-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .file-tab {
      padding: 8px 14px; border-radius: 8px 8px 0 0;
      font-size: 11px; cursor: pointer; display: flex; gap: 5px; align-items: center;
      font-family: inherit; border: none; transition: all 0.2s;
    }

    /* Code block */
    .code-block {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 0 8px 8px 8px;
    }
    .code-header {
      padding: 8px 16px; border-bottom: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    .code-filename { font-size: 11px; color: #475569; }
    .code-actions { display: flex; gap: 8px; }
    .btn-copy, .btn-dl {
      padding: 4px 12px; border-radius: 6px; font-size: 11px; font-family: inherit; border: none;
    }
    .btn-copy { background: transparent; border: 1px solid #334155; color: #94a3b8; cursor: pointer; }
    .btn-copy.copied { color: #22c55e; }
    .btn-dl { background: #0ea5e910; border: 1px solid #0ea5e940; color: #0ea5e9; cursor: pointer; }
    .code-pre {
      margin: 0; padding: 20px; overflow-x: auto; font-size: 11px;
      color: #94a3b8; line-height: 1.7; max-height: 300px; overflow-y: auto;
      direction: ltr; text-align: left; font-family: inherit;
    }

    /* Download all */
    .btn-dl-all {
      display: block; margin: 20px auto 0; padding: 14px 40px; border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none; color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 0 30px #0ea5e940; letter-spacing: 0.5px;
    }

    /* === GITHUB SECTION === */
    .github-section {
      margin-top: 24px; border-radius: 14px;
      border: 1px solid #1e293b; overflow: hidden;
    }
    .github-header {
      padding: 16px 20px;
      background: linear-gradient(90deg, #0d1117, #161b22);
      border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; gap: 12px;
    }
    .github-header-icon { font-size: 22px; }
    .github-header-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .github-header-sub { font-size: 11px; color: #475569; margin-top: 2px; }
    .github-body { padding: 20px; background: #0d1117; }

    .token-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .token-field-wrap { flex: 1; }
    .token-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
    .token-link { font-size: 10px; color: #0ea5e9; text-decoration: none; }
    .token-link:hover { text-decoration: underline; }
    .token-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      background: #0f172a; border: 1px solid #1e293b;
      color: #e2e8f0; font-size: 12px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .token-input:focus { border-color: #6366f1; }
    .token-toggle {
      padding: 10px 14px; border-radius: 8px; border: 1px solid #1e293b;
      background: #0f172a; color: #64748b; font-size: 13px; cursor: pointer; flex-shrink: 0;
    }

    /* Two big action buttons */
    .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    .btn-gh-upload {
      padding: 14px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: all 0.2s; box-shadow: 0 0 20px #23863640;
    }
    .btn-gh-upload:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 24px #23863660; }
    .btn-gh-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-build-apk {
      padding: 14px 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: all 0.2s; box-shadow: 0 0 20px #7c3aed40;
    }
    .btn-build-apk:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 24px #7c3aed60; }
    .btn-build-apk:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Status log */
    .status-log {
      margin-top: 16px; padding: 14px 16px; border-radius: 10px;
      background: #020509; border: 1px solid #1e293b;
      font-size: 11px; color: #22c55e; line-height: 2;
      direction: ltr; text-align: left; min-height: 60px;
      max-height: 200px; overflow-y: auto;
    }
    .status-log .log-line { display: block; }
    .log-info { color: #94a3b8; }
    .log-success { color: #22c55e; }
    .log-error { color: #f87171; }
    .log-warn { color: #fbbf24; }
    .log-link { color: #0ea5e9; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid transparent; border-top-color: currentColor;
      animation: spin 0.7s linear infinite; vertical-align: middle;
    }

    /* APK download card */
    .apk-download-card {
      margin-top: 16px; padding: 16px 20px; border-radius: 12px;
      background: linear-gradient(135deg, #0a2a1a, #0f1f2e);
      border: 1px solid #22c55e40;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .apk-download-icon { font-size: 32px; flex-shrink: 0; }
    .apk-download-info { flex: 1; }
    .apk-download-title { font-size: 13px; font-weight: 700; color: #22c55e; margin-bottom: 4px; }
    .apk-download-sub { font-size: 11px; color: #475569; }
    .btn-download-apk {
      padding: 12px 24px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 6px; box-shadow: 0 0 20px #22c55e40;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 12px; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden;
    }
    @keyframes progress-pulse {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .progress-bar {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #0ea5e9, #6366f1, #22c55e);
      transition: width 0.5s ease;
    }
    .progress-bar.indeterminate {
      width: 30% !important;
      animation: progress-pulse 1.4s ease-in-out infinite;
    }

    /* Build steps */
    .build-steps {
      margin-top: 28px; padding: 20px; border-radius: 12px;
      background: #0f172a; border: 1px solid #1e293b;
    }
    .build-title { font-size: 13px; font-weight: 700; color: #f1f5f9; margin-bottom: 16px; }
    .build-step { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
    .build-num { color: #0ea5e9; font-size: 10px; font-weight: 700; min-width: 24px; margin-top: 10px; }
    .build-cmd {
      display: block; background: #080c14; padding: 8px 14px;
      border-radius: 6px; font-size: 11px; color: #22c55e;
      border: 1px solid #1e293b; direction: ltr; text-align: left; font-family: inherit;
    }
    .build-desc { font-size: 10px; color: #475569; margin-top: 4px; }
    .btn-copy-sm {
      padding: 4px 8px; border-radius: 5px; border: 1px solid #1e293b;
      background: transparent; color: #475569; font-size: 9px; cursor: pointer;
      font-family: inherit; margin-top: 8px; flex-shrink: 0;
    }
    .apk-path {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      background: #080c14; border: 1px solid #1e293b;
    }
    .apk-path-label { font-size: 10px; color: #22c55e; margin-bottom: 4px; font-weight: 600; }
    .apk-path-code { font-size: 10px; color: #94a3b8; direction: ltr; display: block; font-family: inherit; }

    /* Navigation */
    .nav-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 36px; padding-top: 24px; border-top: 1px solid #1e293b;
    }
    .btn-back {
      padding: 10px 24px; border-radius: 8px; border: 1px solid #1e293b;
      background: transparent; font-size: 13px; font-family: inherit;
    }
    .dots { display: flex; gap: 6px; }
    .dot { height: 6px; border-radius: 3px; transition: all 0.3s; }
    .btn-next {
      padding: 10px 24px; border-radius: 8px; border: none;
      font-size: 13px; font-family: inherit; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-next.active {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff; box-shadow: 0 0 20px #0ea5e930;
    }
    .btn-next.inactive { background: #1e293b; color: #334155; cursor: not-allowed; }
    .btn-reset {
      padding: 10px 24px; border-radius: 8px; border: 1px solid #22c55e40;
      background: #22c55e10; color: #22c55e; font-size: 13px; font-family: inherit;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 10px; margin: 20px 0;
      font-size: 11px; color: #334155;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #1e293b;
    }

    @media (max-width: 600px) {
      .perms-grid { grid-template-columns: 1fr; }
      .header { padding: 14px 16px; }
      .main { padding: 20px 14px; }
      .steps-nav { display: none; }
      .action-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">⚡</div>
  <div>
    <div class="logo-text">APK Builder <span class="accent">Pro</span></div>
    <div class="logo-sub">حوّل تطبيق Netlify إلى APK حقيقي • Capacitor v6 + GitHub Actions</div>
  </div>
  <div class="steps-nav" id="stepsNav"></div>
</div>

<div class="main" id="mainContent"></div>

<script>
// ==============================
//  STATE
// ==============================
const PERMISSIONS = [
  { id: "INTERNET", label: "الإنترنت", icon: "🌐", required: true, desc: "اتصال بالإنترنت (إلزامي)" },
  { id: "ACCESS_NETWORK_STATE", label: "حالة الشبكة", icon: "📡", required: true, desc: "فحص حالة الاتصال" },
  { id: "CAMERA", label: "الكاميرا", icon: "📷", required: false, desc: "إرسال صور ومقاطع مرئية" },
  { id: "RECORD_AUDIO", label: "الميكروفون", icon: "🎙️", required: false, desc: "الرسائل الصوتية والمكالمات" },
  { id: "READ_MEDIA_IMAGES", label: "قراءة الصور", icon: "🖼️", required: false, desc: "مشاركة الصور من المعرض" },
  { id: "READ_MEDIA_VIDEO", label: "قراءة الفيديو", icon: "🎬", required: false, desc: "مشاركة مقاطع الفيديو" },
  { id: "READ_EXTERNAL_STORAGE", label: "التخزين (قديم)", icon: "💾", required: false, desc: "للأجهزة Android <13" },
  { id: "WRITE_EXTERNAL_STORAGE", label: "الكتابة للتخزين", icon: "📝", required: false, desc: "حفظ الملفات (Android <10)" },
  { id: "VIBRATE", label: "الاهتزاز", icon: "📳", required: false, desc: "اهتزاز عند الإشعارات" },
  { id: "POST_NOTIFICATIONS", label: "الإشعارات", icon: "🔔", required: false, desc: "إشعارات الرسائل الجديدة" },
  { id: "RECEIVE_BOOT_COMPLETED", label: "تشغيل عند الإقلاع", icon: "🚀", required: false, desc: "استقبال إشعارات عند بدء الجهاز" },
  { id: "WAKE_LOCK", label: "إبقاء الشاشة", icon: "💡", required: false, desc: "منع النوم أثناء المكالمات" },
  { id: "READ_CONTACTS", label: "جهات الاتصال", icon: "👥", required: false, desc: "دعوة الأصدقاء عبر جهات الاتصال" },
  { id: "USE_BIOMETRIC", label: "البصمة / الوجه", icon: "🔐", required: false, desc: "قفل التطبيق بالبصمة" },
  { id: "FLASHLIGHT", label: "الفلاش", icon: "🔦", required: false, desc: "فلاش أثناء المكالمات" },
  { id: "CHANGE_NETWORK_STATE", label: "تغيير الشبكة", icon: "🔄", required: false, desc: "إدارة اتصالات Wi-Fi" },
];

const STEPS = ["معلومات التطبيق", "الصلاحيات", "الملفات والتحميل"];

let state = {
  step: 0,
  appName: "",
  packageId: "",
  netlifyUrl: "",
  selectedPerms: PERMISSIONS.filter(p => p.required).map(p => p.id),
  activeFile: "capacitor.config.ts",
  copied: "",
  ghToken: "",
  showToken: false,
  ghRepoName: "",
  ghRepoUrl: "",
  ghUsername: "",
  uploadDone: false,
  buildRunId: null,
  apkUrl: null,
  buildStatus: "idle", // idle | uploading | uploaded | building | done | error
  logLines: [],
};

// ==============================
//  GENERATORS
// ==============================
function genCapacitor() {
  const { appName, packageId, netlifyUrl } = state;
  return `import { CapacitorConfig } from '@capacitor/cli';

const config: CapacitorConfig = {
  appId: '${packageId || "com.example.chatapp"}',
  appName: '${appName || "My Chat App"}',
  webDir: 'www',
  server: {
    url: '${netlifyUrl || "https://your-app.netlify.app"}',
    cleartext: false,
    androidScheme: 'https',
  },
  android: {
    allowMixedContent: false,
    captureInput: true,
    webContentsDebuggingEnabled: false,
  },
  plugins: {
    PushNotifications: {
      presentationOptions: ['badge', 'sound', 'alert'],
    },
    LocalNotifications: {
      smallIcon: 'ic_stat_icon_config_sample',
      iconColor: '#0ea5e9',
      sound: 'beep.wav',
    },
    SplashScreen: {
      launchShowDuration: 2000,
      launchAutoHide: true,
      backgroundColor: '#0f172a',
      androidSplashResourceName: 'splash',
      showSpinner: false,
    },
    StatusBar: {
      style: 'DARK',
      backgroundColor: '#0f172a',
    },
  },
};

export default config;`;
}

function genManifest() {
  const { appName, packageId, selectedPerms } = state;
  const lines = selectedPerms.map(p => `    <uses-permission android:name="android.permission.${p}" />`).join("\n");
  return `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${packageId || "com.example.chatapp"}">

    <!-- ===== Permissions ===== -->
${lines}

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="${appName || "My Chat App"}"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="false"
        android:networkSecurityConfig="@xml/network_security_config">

        <activity
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
            android:name="com.getcapacitor.BridgeActivity"
            android:label="${appName || "My Chat App"}"
            android:launchMode="singleTask"
            android:exported="true"
            android:theme="@style/AppTheme.NoActionBarLaunch">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>

        <service
            android:name="com.google.firebase.messaging.FirebaseMessagingService"
            android:exported="false">
            <intent-filter>
                <action android:name="com.google.firebase.MESSAGING_EVENT" />
            </intent-filter>
        </service>

        <provider
            android:name="androidx.core.content.FileProvider"
            android:authorities="\${applicationId}.fileprovider"
            android:exported="false"
            android:grantUriPermissions="true">
            <meta-data
                android:name="android.support.FILE_PROVIDER_PATHS"
                android:resource="@xml/file_paths" />
        </provider>

    </application>
</manifest>`;
}

function genPackage() {
  const name = (state.appName || "chat-app").toLowerCase().replace(/\s+/g, "-");
  return `{
  "name": "${name}",
  "version": "1.0.0",
  "description": "Chat App - Built with Capacitor",
  "scripts": {
    "build": "echo 'web build done'",
    "sync": "npx cap sync",
    "android": "npx cap open android",
    "build:apk": "cd android && ./gradlew assembleDebug",
    "build:aab": "cd android && ./gradlew bundleRelease"
  },
  "dependencies": {
    "@capacitor/android": "^6.0.0",
    "@capacitor/app": "^6.0.0",
    "@capacitor/camera": "^6.0.0",
    "@capacitor/core": "^6.0.0",
    "@capacitor/filesystem": "^6.0.0",
    "@capacitor/haptics": "^6.0.0",
    "@capacitor/keyboard": "^6.0.0",
    "@capacitor/local-notifications": "^6.0.0",
    "@capacitor/network": "^6.0.0",
    "@capacitor/push-notifications": "^6.0.0",

// ==============================
//  HELPERS
// ==============================
function downloadFile(filename, content) {
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename.split('/').pop(); a.click();
  URL.revokeObjectURL(url);
}

function downloadAll() {
  const files = getFiles();
  Object.entries(files).forEach(([name, content], i) => {
    setTimeout(() => downloadFile(name, content), i * 300);
  });
}

function copyText(text, key) {
  navigator.clipboard.writeText(text).then(() => {
    state.copied = key;
    render();
    setTimeout(() => { state.copied = ""; render(); }, 2000);
  });
}

function canProceed() {
  if (state.step === 0) return state.appName.trim() && state.packageId.trim() && state.netlifyUrl.trim();
  return true;
}

function togglePerm(id) {
  const perm = PERMISSIONS.find(p => p.id === id);
  if (perm.required) return;
  if (state.selectedPerms.includes(id)) {
    state.selectedPerms = state.selectedPerms.filter(p => p !== id);
  } else {
    state.selectedPerms = [...state.selectedPerms, id];
  }
  render();
}

function addLog(msg, type = "info") {
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  state.logLines.push({ msg, type, time });
  render();
  // scroll log to bottom
  setTimeout(() => {
    const log = document.getElementById("statusLog");
    if (log) log.scrollTop = log.scrollHeight;
  }, 50);
}

function toBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

// ==============================
//  GITHUB API
// ==============================
async function ghRequest(path, method = "GET", body = null) {
  const opts = {
    method,
    headers: {
      "Authorization": `Bearer ${state.ghToken}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      "Content-Type": "application/json",
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`https://api.github.com${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

async function uploadToGitHub() {
  if (!state.ghToken.trim()) { addLog("❌ الرجاء إدخال GitHub Token أولاً", "error"); return; }
  state.buildStatus = "uploading";
  state.logLines = [];
  state.apkUrl = null;
  render();

  try {
    // 1. Get username
    addLog("🔑 التحقق من Token...", "info");
    const user = await ghRequest("/user");
    state.ghUsername = user.login;
    addLog(`✅ مرحباً ${user.login}`, "success");

    // 2. Generate repo name
    const repoSlug = (state.appName || "my-app").toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "") || "apk-builder-app";
    const repoName = `${repoSlug}-${Date.now().toString(36)}`;
    state.ghRepoName = repoName;

    // 3. Create repo
    addLog(`📁 إنشاء مستودع: ${repoName}...`, "info");
    const repo = await ghRequest("/user/repos", "POST", {
      name: repoName,
      description: `APK build for ${state.appName || "My App"} - built with APK Builder Pro`,
      private: false,
      auto_init: false,
    });
    state.ghRepoUrl = repo.html_url;
    addLog(`✅ تم إنشاء المستودع: ${repo.html_url}`, "success");

    // 4. Upload files
    const files = getFiles();
    const fileEntries = Object.entries(files);
    for (let i = 0; i < fileEntries.length; i++) {
      const [path, content] = fileEntries[i];
      addLog(`📤 رفع ${path} (${i+1}/${fileEntries.length})...`, "info");
      await ghRequest(`/repos/${user.login}/${repoName}/contents/${path}`, "PUT", {
        message: `Add ${path}`,
        content: toBase64(content),
      });
      // small delay to avoid rate limits
      await new Promise(r => setTimeout(r, 400));
    }
    addLog("✅ تم رفع جميع الملفات بنجاح!", "success");
    state.uploadDone = true;
    state.buildStatus = "uploaded";
    render();

  } catch (err) {
    addLog(`❌ خطأ: ${err.message}`, "error");
    state.buildStatus = "error";
    render();
  }
}

async function buildAPK() {
  if (!state.ghToken.trim()) { addLog("❌ الرجاء إدخال GitHub Token أولاً", "error"); return; }

  // If not uploaded yet, do upload first
  if (!state.uploadDone) {
    await uploadToGitHub();
    if (state.buildStatus === "error") return;
  }

  state.buildStatus = "building";
  addLog("🚀 تشغيل GitHub Actions لبناء APK...", "info");
  render();

  try {
    // Trigger workflow_dispatch
    await ghRequest(`/repos/${state.ghUsername}/${state.ghRepoName}/actions/workflows/build.yml/dispatches`, "POST", {
      ref: "main",
    });
    addLog("⚙️ تم تشغيل workflow بنجاح! انتظار بدء البناء...", "info");
    
    // Poll for run
    let runId = null;
    for (let attempt = 0; attempt < 20; attempt++) {
      await new Promise(r => setTimeout(r, 4000));
      const runs = await ghRequest(`/repos/${state.ghUsername}/${state.ghRepoName}/actions/runs?per_page=5`);
      if (runs.workflow_runs && runs.workflow_runs.length > 0) {
        const latest = runs.workflow_runs[0];
        runId = latest.id;
        addLog(`🔄 حالة البناء: ${latest.status} (${latest.conclusion || "جارٍ..."})`, "info");
        if (latest.status === "completed") {
          if (latest.conclusion === "success") {
            addLog("✅ البناء اكتمل بنجاح!", "success");
            state.buildRunId = runId;
            break;
          } else {
            throw new Error(`فشل البناء: ${latest.conclusion}`);
          }
        }
      }
    }

    if (!runId) throw new Error("انتهت مهلة الانتظار. تحقق من GitHub Actions.");

    // Get artifact
    addLog("📦 البحث عن ملف APK...", "info");
    await new Promise(r => setTimeout(r, 2000));
    const artifacts = await ghRequest(`/repos/${state.ghUsername}/${state.ghRepoName}/actions/runs/${runId}/artifacts`);
    
    if (artifacts.artifacts && artifacts.artifacts.length > 0) {
      const art = artifacts.artifacts.find(a => a.name === "app-debug") || artifacts.artifacts[0];
      // Direct download URL requires auth - link to actions page instead
      const actionsUrl = `https://github.com/${state.ghUsername}/${state.ghRepoName}/actions/runs/${runId}`;
      state.apkUrl = actionsUrl;
      state.apkArtifactId = art.id;
      addLog(`🎉 APK جاهز للتنزيل!`, "success");
      addLog(`🔗 ${actionsUrl}`, "link");
    } else {
      throw new Error("لم يُعثر على ملف APK في artifacts");
    }

    state.buildStatus = "done";
    render();

  } catch (err) {
    addLog(`❌ خطأ: ${err.message}`, "error");
    if (state.ghRepoName) {
      addLog(`💡 تحقق يدوياً: https://github.com/${state.ghUsername}/${state.ghRepoName}/actions`, "info");
    }
    state.buildStatus = "error";
    render();
  }
}

  nav.innerHTML = STEPS.map((s, i) => {
    const isActive = state.step === i;

    return `<button class="step-btn" onclick="${isDone ? `goStep(${i})` : ''}"
      style="
        background:${isActive ? '#0ea5e920' : 'transparent'};
        border:1px solid ${isActive ? '#0ea5e940' : 'transparent'};
        border-radius:20px;
        color:${isActive ? '#0ea5e9' : isDone ? '#22c55e' : '#475569'};
        font-weight:${isActive ? 600 : 400};
        cursor:${isDone ? 'pointer' : 'default'};
        padding:5px 14px;
      ">
      <span class="step-dot" style="background:${isDone ? '#22c55e' : isActive ? '#0ea5e9' : '#1e293b'}">
        ${isDone ? '✓' : i + 1}
      </span>
      ${s}
    </button>`;
  }).join("");
}

function goStep(i) { state.step = i; render(); }

    <div class="github-header">
      <div class="github-header-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#f1f5f9"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </div>
      <div>
        <div class="github-header-title">GitHub <span class="accent-purple">Auto Deploy</span></div>
        <div class="github-header-sub">ارفع الملفات وابنِ APK بضغطة زر واحدة</div>
      </div>
    </div>
    <div class="github-body">
      <div class="token-row">
        <div class="token-field-wrap">
          <div class="token-label">
            🔑 GitHub Personal Access Token
            <a class="token-link" href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=APK+Builder+Pro" target="_blank">← احصل على Token</a>
          </div>
          <input
            class="token-input"
            id="ghTokenInput"
            type="${state.showToken ? 'text' : 'password'}"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            value="${state.ghToken}"
            oninput="state.ghToken=this.value"
            autocomplete="off"
          />
        </div>
        <button class="token-toggle" onclick="state.showToken=!state.showToken;render()">${state.showToken ? '🙈' : '👁️'}</button>
      </div>

      <div style="font-size:10px;color:#475569;margin-bottom:14px;padding:8px 12px;background:#080c14;border-radius:6px;border:1px solid #1e293b;direction:ltr;text-align:left;">
        ℹ️ Required scopes: <code style="color:#0ea5e9">repo</code> + <code style="color:#0ea5e9">workflow</code> — Token stays in your browser only, never sent to any server.
      </div>

      <div class="action-buttons">
        <button class="btn-gh-upload"
          onclick="uploadToGitHub()"
          ${isUploading || (state.uploadDone && state.buildStatus !== 'error') ? 'disabled' : ''}>
          ${uploadBtnLabel}
        </button>
        <button class="btn-build-apk"
          onclick="buildAPK()"
          ${isBuilding || isDone ? 'disabled' : ''}>
          ${buildBtnLabel}
        </button>
      </div>

      ${isLoading ? `<div class="progress-wrap"><div class="progress-bar indeterminate"></div></div>` : progressPct > 0 ? `<div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div>` : ''}

      <div class="status-log" id="statusLog" style="margin-top:${state.logLines.length > 0 || isLoading ? '12' : '0'}px;${state.logLines.length === 0 && !isLoading ? 'display:none' : ''}">${logHtml}</div>

      ${apkCard}

      ${state.ghRepoUrl ? `
        <div style="margin-top:10px;font-size:11px;color:#475569;text-align:center">
          📁 المستودع: <a href="${state.ghRepoUrl}" target="_blank" style="color:#0ea5e9;text-decoration:underline">${state.ghRepoUrl}</a>
        </div>` : ''}
    </div>
  </div>

  <div class="build-steps" style="margin-top:20px">
    <div class="build-title">🚀 خطوات البناء اليدوي (بديل)</div>
    ${buildSteps}
    <div class="apk-path">
      <div class="apk-path-label">📍 مسار APK بعد البناء:</div>
      <code class="apk-path-code">android/app/build/outputs/apk/debug/app-debug.apk</code>
    </div>
  </div>

  ${renderNavBar()}`;
}

function renderNavBar() {
  const isLast = state.step === 2;
  const isFirst = state.step === 0;
  const ok = canProceed();

  const dotsHtml = [0,1,2].map(i => `
    <div class="dot" style="
      width:${i===state.step?24:6}px;
      background:${i<=state.step?'#0ea5e9':'#1e293b'};
    "></div>`).join("");

  const rightBtn = isLast
    ? `<button class="btn-reset" onclick="resetAll()">+ مشروع جديد</button>`
    : `<button class="btn-next ${ok ? 'active' : 'inactive'}" onclick="nextStep()">
        ${state.step === 1 ? '⚡ توليد الملفات' : 'التالي ←'}
      </button>`;

  return `
  <div class="nav-bar">
    <button class="btn-back" onclick="prevStep()"
      style="color:${isFirst ? '#1e293b' : '#94a3b8'};cursor:${isFirst ? 'not-allowed' : 'pointer'}">
      → السابق
    </button>
    <div class="dots">${dotsHtml}</div>
    ${rightBtn}
  </div>`;
}

// ==============================
//  ATTACH EVENTS
// ==============================
function attachEvents() {
  const name = document.getElementById("f-name");
  const pkg = document.getElementById("f-pkg");
  const url = document.getElementById("f-url");
  if (name) name.addEventListener("input", e => { state.appName = e.target.value; updateNav(); });
  if (pkg)  pkg.addEventListener("input",  e => { state.packageId = e.target.value; updateNav(); });
  if (url)  url.addEventListener("input",  e => { state.netlifyUrl = e.target.value; updateNav(); });
}

function updateNav() {
  const btn = document.querySelector(".btn-next");
  if (btn) {
    const ok = canProceed();
    btn.className = `btn-next ${ok ? 'active' : 'inactive'}`;
    btn.style.background = ok ? 'linear-gradient(135deg, #0ea5e9, #6366f1)' : '#1e293b';
    btn.style.color = ok ? '#fff' : '#334155';
    btn.style.cursor = ok ? 'pointer' : 'not-allowed';
    btn.style.boxShadow = ok ? '0 0 20px #0ea5e930' : 'none';
  }
}

// ==============================
//  ACTIONS (global)
// ==============================
window.nextStep = function() { if (canProceed() && state.step < 2) { state.step++; render(); } }
window.prevStep = function() { if (state.step > 0) { state.step--; render(); } }
window.goStep   = function(i) { state.step = i; render(); }
window.togglePerm = togglePerm;
window.setFile  = function(n) { state.activeFile = n; render(); }
window.copyActive = function() { copyText(getFiles()[state.activeFile], state.activeFile); }
window.dlActive   = function() { downloadFile(state.activeFile, getFiles()[state.activeFile]); }
window.downloadAll = downloadAll;
window.copyCmd = function(cmd, key) { copyText(cmd, key); }
window.uploadToGitHub = uploadToGitHub;
window.buildAPK = buildAPK;
window.resetAll = function() {
  state = {
    step: 0, appName: "", packageId: "", netlifyUrl: "",
    selectedPerms: PERMISSIONS.filter(p => p.required).map(p => p.id),
    activeFile: "capacitor.config.ts", copied: "",
    ghToken: "", showToken: false,
    ghRepoName: "", ghRepoUrl: "", ghUsername: "",
    uploadDone: false, buildRunId: null, apkUrl: null,
    buildStatus: "idle", logLines: [],
  };
  render();
}

function escapeHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escapeAttr(str) {
  return String(str).replace(/'/g,"\\'");
}

// Boot
render();
</script>
</body>
</html>
